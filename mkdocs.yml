site_name: LLM Extractinator
repo_url: https://github.com/DIAGNijmegen/llm_extractinator
theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
nav:
  - Home: index.md
  - Getting started:
      - Installation: installation.md
      - Quickstart: quickstart.md
  - Building tasks:
      - Preparing Data: preparing-data.md
      - Output Schema: parser.md
      - Few-Shot Prompting: examples.md
      - Manual Configuration: manual-configuration.md
  - Running:
      - Studio: studio.md
      - CLI Usage: cli.md
      - Python API: python.md
      - Understanding Output: output.md
  - Reference:
      - Settings & Flags: settings-reference.md
      - Troubleshooting: troubleshooting.md
  - Deployment:
      - Docker: docker.md
      - CPU only: cpu-only.md
markdown_extensions:
  - admonition
  - codehilite
  - pymdownx.details
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true
